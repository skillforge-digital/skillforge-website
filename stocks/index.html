    <script>
        const RELEASED_WEEKS = 4;

        function renderContent() {
            const raw = window.location.hash.replace('#', '') || 'week-1/day-1';
            const parts = raw.split('/');
            const weekPart = parts[0] || 'week-1';
            const dayPart = parts[1] || 'day-1';
            const weekNum = parseInt(weekPart.replace('week-', ''));
            const dayId = dayPart.replace('day-', '') || '1';

            document.querySelectorAll('aside button').forEach(btn => {
                btn.classList.remove('text-amber-600', 'bg-amber-50', 'border-amber-600');
                btn.classList.add('text-slate-500', 'border-transparent');
            });
            const activeBtn = document.getElementById('nav-' + weekPart);
            if (activeBtn) {
                activeBtn.classList.remove('text-slate-500', 'border-transparent');
                activeBtn.classList.add('text-amber-600', 'bg-amber-50', 'border-amber-600'); 
            }

            document.querySelectorAll('#day-tabs button').forEach(btn => {
                btn.classList.remove('tab-active');
            });
            const activeTab = document.getElementById('tab-day-' + dayId);
            if (activeTab) activeTab.classList.add('tab-active');

            if (!weekPart.startsWith('week-') || isNaN(weekNum)) {
                showTemplate('not-found');
                return;
            }
            if (weekNum > RELEASED_WEEKS) {
                showTemplate('coming-soon');
                return;
            }

            const tplId = `w${weekNum}-d${dayId}`;
            showTemplate(tplId);
        }

        function showTemplate(id) {
            const container = document.getElementById('content-container');
            const template = document.getElementById(id);
            container.innerHTML = '';
            if (template) {
                container.appendChild(template.content.cloneNode(true));
                window.scrollTo(0, 0);
            } else {
                const notFound = document.getElementById('not-found');
                container.appendChild(notFound.content.cloneNode(true));
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            ['1', '3', '5'].forEach(day => {
                document.getElementById('tab-day-' + day).addEventListener('click', () => {
                    const raw = window.location.hash.replace('#', '') || 'week-1/day-1';
                    const wk = (raw.split('/')[0] || 'week-1');
                    location.hash = `${wk}/day-${day}`;
                });
            });
            renderContent();
        });

        window.addEventListener('hashchange', renderContent);
    </script>
